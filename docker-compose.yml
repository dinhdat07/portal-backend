version: "3.9"

services:
  db:
    image: postgres:15
    container_name: portal_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_portal_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: portal_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: portal_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025" # Web UI

volumes:
  postgres_portal_data: