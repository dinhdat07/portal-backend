syntax = "proto3";

package portal.user.v1;

option go_package = "portal-system/gen/go/portal/user/v1;userv1";

import "google/api/annotations.proto";
import "portal/common/v1/common.proto";

service UserService {
  rpc GetMyProfile(GetMyProfileRequest) returns (portal.common.v1.User) {
    option (google.api.http) = {
      get: "/api/v1/users/me"
    };
  }

  rpc UpdateMyProfile(UpdateMyProfileRequest) returns (portal.common.v1.User) {
    option (google.api.http) = {
      put: "/api/v1/users/me"
      body: "*"
    };
  }

  rpc ChangeMyPassword(ChangeMyPasswordRequest) returns (portal.common.v1.MessageResponse) {
    option (google.api.http) = {
      put: "/api/v1/users/me/change-password"
      body: "*"
    };
  }
}

message GetMyProfileRequest {}

message UpdateMyProfileRequest {
  optional string first_name = 1;
  optional string last_name = 2;
  optional string username = 3;
  optional string dob = 4;
}

message ChangeMyPasswordRequest {
  string current_password = 1;
  string new_password = 2;
  string confirm_new_password = 3;
}